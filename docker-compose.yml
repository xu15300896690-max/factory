services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - WEB_ORIGIN=${WEB_ORIGIN}
      - DB_PATH=/app/data/app.sqlite
      - AUTO_APPROVAL_LIMIT=${AUTO_APPROVAL_LIMIT:-50}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  api-data:

networks:
  internal: